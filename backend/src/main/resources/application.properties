spring.application.name=smart-campus-backend

# =========================
# ACTIVE PROFILE
# =========================
spring.profiles.active=local

# =========================
# SERVER CONFIGURATION
# =========================
server.port=8080
server.servlet.context-path=/api

# =========================
# LOGGING
# =========================
logging.level.root=INFO
logging.level.com.smartcampus=DEBUG

# =========================
# JWT CONFIGURATION
# =========================
app.jwtSecret=mySecretKeyForSmartCampusOperationsHubJWTTokenGenerationAndValidation12345
app.jwtExpirationMs=86400000

# =========================
# FILE UPLOAD CONFIGURATION
# =========================
file.upload-dir=uploads/
file.max-size=10485760

# =========================
# CORS CONFIGURATION
# =========================
cors.allowedOrigins=http://localhost:3000,http://localhost:5173,http://localhost:3001,http://localhost:3002
